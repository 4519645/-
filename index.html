<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>汽车工业演变交互式分析系统</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
    .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: inline-block; }
    h2 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .hint { background: #e7f3ff; border-left: 5px solid #2196f3; padding: 15px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; border-radius: 4px; }
    b { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="container">
    <h2>汽车工业演变交互式分析系统</h2>
    <div class="hint">
      <strong>💡 交互指南：</strong><br>
      1. <b>框选过滤：</b>在左侧散点图内【鼠标拖拽】可选择特定车型，右侧和下方图表将实时联动。<br>
      2. <b>图例交互：</b>点击右侧产地颜色（文字或方块），可【高亮】特定产地的汽车。<br>
      3. <b>年份高亮：</b>点击下方折线图的【数据点】，上方散点图将只高亮该年份的车辆。
    </div>
    <div id="vis"></div>
  </div>

<script>
const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "data": {"url": "https://raw.githubusercontent.com/vega/vega-datasets/master/data/cars.json"},
  
  // 【关键改进1：在最外层定义共享交互】
  "params": [
    {
      "name": "originSelect",
      "select": {"type": "point", "fields": ["Origin"]},
      "bind": "legend"  // 绑定图例
    },
    {
      "name": "brush",
      "select": "interval"
    },
    {
      "name": "yearClick",
      "select": {"type": "point", "fields": ["Year"]}
    }
  ],

  "vconcat": [
    {
      "hconcat": [
        {
          "width": 450,
          "height": 350,
          "title": "性能分布 (马力 vs 油耗)",
          "mark": {"type": "circle", "size": 60, "tooltip": true},
          "encoding": {
            "x": {"field": "Horsepower", "type": "quantitative"},
            "y": {"field": "Miles_per_Gallon", "type": "quantitative"},
            "color": {
              "condition": {"param": "originSelect", "field": "Origin", "type": "nominal"},
              "value": "lightgrey"
            },
            // 【关键改进2：散点图透明度受框选和年份点击双重控制】
            "opacity": {
              "condition": [
                {"param": "brush", "value": 1},
                {"param": "yearClick", "value": 1}
              ],
              "value": 0.05
            }
          }
        },
        {
          "width": 150,
          "height": 350,
          "title": "选中区域平均气缸数",
          "transform": [
            {"filter": {"param": "brush"}},
            {"filter": {"param": "originSelect"}}
          ],
          "mark": "bar",
          "encoding": {
            "x": {"field": "Origin", "type": "nominal", "axis": {"labelAngle": 0}},
            "y": {"aggregate": "mean", "field": "Cylinders", "scale": {"domain": [0,8]}},
            "color": {"field": "Origin", "type": "nominal", "legend": null}
          }
        }
      ]
    },
    {
      "width": 680,
      "height": 150,
      "title": "历年燃油效率演变 (点击年份可反向高亮)",
      "transform": [
        {"filter": {"param": "brush"}},
        {"filter": {"param": "originSelect"}}
      ],
      "mark": {"type": "line", "point": {"size": 80}, "cursor": "pointer"},
      "encoding": {
        "x": {"timeUnit": "year", "field": "Year", "title": "年份"},
        "y": {"aggregate": "mean", "field": "Miles_per_Gallon", "title": "平均 MPG"},
        "color": {"field": "Origin", "type": "nominal"},
        // 增加年份点击时的视觉反馈
        "opacity": {
          "condition": {"param": "yearClick", "value": 1},
          "value": 0.2
        }
      }
    }
  ],
  "config": {
    "view": {"stroke": "transparent"},
    "axis": {"grid": true, "gridColor": "#eee"}
  }
};

vegaEmbed('#vis', spec, {"actions": false});
</script>
</body>
</html>
