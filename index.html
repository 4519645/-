<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>汽车数据联动分析系统</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: inline-block; }
    h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
    .guide { background: #fffbe6; border: 1px solid #ffe58f; padding: 12px; margin-bottom: 15px; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>汽车工业多维联动分析系统</h2>
    <div class="guide">
        <strong>交互说明：</strong><br>
        1. <b>筛选产地：</b>直接点击图表最上方的【Origin】图例（文字或圆点）。<br>
        2. <b>时间回溯：</b>点击最下方折线图上的【圆点】，上方散点图将高亮对应年份。<br>
        3. <b>范围框选：</b>在散点图上拖拽鼠标，可观察局部数据的统计特征。
    </div>
    <div id="vis"></div>
  </div>

<script>
const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "data": {"url": "https://raw.githubusercontent.com/vega/vega-datasets/master/data/cars.json"},
  
  // 定义全局交互参数
  "params": [
    {
      "name": "origin_filter",
      "select": {"type": "point", "fields": ["Origin"]},
      "bind": "legend" 
    },
    {
      "name": "year_filter",
      "select": {"type": "point", "fields": ["Year"]}
    },
    {
      "name": "brush",
      "select": "interval"
    }
  ],

  "vconcat": [
    {
      "hconcat": [
        {
          "width": 400,
          "height": 300,
          "title": "性能分布 (马力 vs 油耗)",
          "mark": {"type": "circle", "size": 50, "tooltip": true},
          "encoding": {
            "x": {"field": "Horsepower", "type": "quantitative"},
            "y": {"field": "Miles_per_Gallon", "type": "quantitative"},
            "color": {
              "condition": {"param": "origin_filter", "field": "Origin", "type": "nominal"},
              "value": "#ddd"
            },
            "opacity": {
              "condition": [
                {"param": "brush", "value": 1},
                {"param": "year_filter", "value": 1}
              ],
              "value": 0.1
            }
          }
        },
        {
          "width": 180,
          "height": 300,
          "title": "平均气缸数 (实时统计)",
          "transform": [
            {"filter": {"param": "brush"}},
            {"filter": {"param": "origin_filter"}}
          ],
          "mark": "bar",
          "encoding": {
            "x": {"field": "Origin", "type": "nominal", "axis": {"labelAngle": 0}},
            "y": {"aggregate": "mean", "field": "Cylinders", "title": "Mean Cylinders"},
            "color": {"field": "Origin", "type": "nominal", "legend": {"orient": "top", "title": "点击图例进行筛选 ->"}}
          }
        }
      ]
    },
    {
      "width": 640,
      "height": 120,
      "title": "历年燃油效率演变趋势 (点击下方圆点高亮上方年份)",
      "transform": [
        {"filter": {"param": "brush"}},
        {"filter": {"param": "origin_filter"}}
      ],
      "mark": {"type": "line", "point": {"size": 100}, "cursor": "pointer"},
      "encoding": {
        "x": {"timeUnit": "year", "field": "Year", "title": "年份"},
        "y": {"aggregate": "mean", "field": "Miles_per_Gallon", "title": "平均 MPG"},
        "color": {"field": "Origin", "type": "nominal", "legend": null},
        "opacity": {
          "condition": {"param": "year_filter", "value": 1},
          "value": 0.2
        }
      }
    }
  ],
  "config": {
    "view": {"stroke": null}
  }
};

vegaEmbed('#vis', spec, {"actions": false}).then(result => {
    console.log("可视化加载成功");
}).catch(console.error);
</script>
</body>
</html>
