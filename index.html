<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>汽车工业演变交互式分析系统</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
    .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
    h2 { color: #333; margin-top: 0; }
    .hint { color: #666; font-size: 0.9em; margin-bottom: 15px; border-left: 4px solid #42b983; padding-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>汽车工业演变交互式分析系统</h2>
    <div class="hint">
      <strong>交互黑科技：</strong><br>
      1. <b>跨维度联动：</b>在左图【散点图】中拖拽鼠标框选，下方【趋势图】和右侧【统计图】会实时重新计算选中车辆的数据。<br>
      2. <b>时间过滤：</b>在下方【趋势图】点击具体年份，可高亮左图中对应年份的车型。<br>
      3. <b>多选：</b>点击右侧【图例】可过滤产地。
    </div>
    <div id="vis"></div>
  </div>

<script>
const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "data": {"url": "https://raw.githubusercontent.com/vega/vega-datasets/master/data/cars.json"},
  "vconcat": [
    {
      "hconcat": [
        {
          "width": 450,
          "height": 350,
          "title": "性能分布 (马力 vs 油耗)",
          "params": [
            {"name": "brush", "select": "interval"},
            {"name": "grid", "select": "interval", "bind": "scales"}
          ],
          "mark": {"type": "circle", "tooltip": true},
          "encoding": {
            "x": {"field": "Horsepower", "type": "quantitative"},
            "y": {"field": "Miles_per_Gallon", "type": "quantitative"},
            "color": {
              "condition": {"param": "brush", "field": "Origin", "type": "nominal"},
              "value": "grey"
            },
            "opacity": {
              "condition": {"param": "yearClick", "value": 1},
              "value": 0.1
            }
          }
        },
        {
          "width": 150,
          "height": 350,
          "title": "选中区域平均气缸数",
          "transform": [{"filter": {"param": "brush"}}],
          "mark": "bar",
          "encoding": {
            "x": {"field": "Origin", "type": "nominal", "axis": {"labelAngle": 0}},
            "y": {"aggregate": "mean", "field": "Cylinders", "scale": {"domain": [0,8]}},
            "color": {"field": "Origin", "type": "nominal", "legend": null}
          }
        }
      ]
    },
    {
      "width": 680,
      "height": 150,
      "title": "历年燃油效率演变趋势 (点击年份过滤)",
      "params": [
        {
          "name": "yearClick",
          "select": {"type": "point", "fields": ["Year"], "toggle": "true"}
        }
      ],
      "transform": [{"filter": {"param": "brush"}}],
      "mark": {"type": "line", "point": true},
      "encoding": {
        "x": {"timeUnit": "year", "field": "Year", "title": "年份"},
        "y": {"aggregate": "mean", "field": "Miles_per_Gallon", "title": "平均 MPG"},
        "color": {"field": "Origin", "type": "nominal"},
        "opacity": {
          "condition": {"param": "yearClick", "value": 1},
          "value": 0.2
        }
      }
    }
  ],
  "config": {"view": {"stroke": null}}
};

vegaEmbed('#vis', spec);
</script>
</body>
</html>
